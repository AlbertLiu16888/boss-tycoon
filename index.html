<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>霸總養成計畫：2026 逆襲人生</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-app text-gray-100 flex flex-col max-w-lg mx-auto relative">

<!-- Splash Screen -->
<div id="splash-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-app">
  <div class="text-center px-6">
    <div class="text-6xl mb-4 neon-glow-text animate-pulse-slow">💰</div>
    <h1 class="text-3xl font-black neon-text mb-2">霸總養成計畫</h1>
    <p class="text-cyan-400 text-lg mb-8 tracking-widest">2026 逆襲人生</p>
    <div class="space-y-3 w-64 mx-auto">
      <button onclick="Game.newGame()" class="w-full py-3 bg-cyan-600 hover:bg-cyan-500 rounded-xl font-bold text-lg transition neon-border">
        🚀 新遊戲
      </button>
      <button id="continue-btn" onclick="Game.loadGame()" class="w-full py-3 bg-gray-800 hover:bg-gray-700 rounded-xl font-bold text-lg transition border border-gray-700 hidden">
        📂 繼續遊戲
      </button>
      <button onclick="Leaderboard.showModal()" class="w-full py-3 bg-gray-800 hover:bg-gray-700 rounded-xl font-bold text-lg transition border border-yellow-800">
        🏅 排行榜
      </button>
    </div>
    <p class="text-gray-600 text-xs mt-6">在 40 年內達成 10 億資產目標</p>
  </div>
</div>

<!-- Top Status Bar -->
<header id="top-bar" class="flex-shrink-0 z-40 bg-gray-900 px-4 py-2 border-b border-cyan-900 hidden">
  <div class="flex justify-between items-center text-sm">
    <div class="flex items-center gap-2">
      <span class="text-cyan-400 font-bold" id="age-display">20歲</span>
      <span class="text-gray-500">|</span>
      <span class="text-yellow-400" id="year-display">第 1 年</span>
    </div>
    <button onclick="Game.nextTurn()" id="next-turn-btn" class="px-4 py-1 bg-cyan-700 hover:bg-cyan-600 rounded-lg font-bold text-xs transition neon-border-sm">
      下一年 ▶
    </button>
  </div>
  <div class="grid grid-cols-3 gap-2 mt-2 text-xs">
    <div class="bg-gray-800 rounded-lg p-2 text-center">
      <div class="text-gray-500">💵 現金</div>
      <div class="text-green-400 font-bold truncate" id="cash-display">$1,000,000</div>
    </div>
    <div class="bg-gray-800 rounded-lg p-2 text-center">
      <div class="text-gray-500">❤️ 健康</div>
      <div class="font-bold" id="health-display">
        <div class="w-full bg-gray-700 rounded-full h-2 mt-1">
          <div class="bg-red-500 h-2 rounded-full transition-all" id="health-bar" style="width:100%"></div>
        </div>
      </div>
    </div>
    <div class="bg-gray-800 rounded-lg p-2 text-center">
      <div class="text-gray-500">⭐ 名聲</div>
      <div class="text-purple-400 font-bold" id="rep-display">0</div>
    </div>
  </div>
  <div class="mt-2 text-center">
    <span class="text-gray-500 text-xs">📊 總資產：</span>
    <span class="text-cyan-300 font-black text-sm" id="networth-display">$1,000,000</span>
  </div>
</header>

<!-- News Ticker -->
<div id="news-ticker" class="flex-shrink-0 bg-gray-900 border-b border-gray-800 overflow-hidden h-8 flex items-center hidden">
  <span class="text-yellow-500 text-xs font-bold px-2 flex-shrink-0">📰 快訊</span>
  <div class="overflow-hidden flex-1">
    <div id="ticker-text" class="whitespace-nowrap text-xs text-cyan-300 ticker-animate">
      歡迎來到 2026 年的台灣！你的逆襲人生即將開始...
    </div>
  </div>
</div>

<!-- Main Content Area -->
<main id="main-content" class="flex-1 overflow-y-auto pb-20 hidden">
  <!-- Market Tab -->
  <div id="tab-market" class="tab-content p-4 space-y-3">
    <div class="flex justify-between items-center mb-2">
      <h2 class="text-lg font-bold text-cyan-400">🏪 商品市場</h2>
      <span class="text-xs text-gray-500">倉庫: <span id="inventory-count">0</span>/<span id="inventory-max">10</span></span>
    </div>
    <div id="market-list" class="space-y-3"></div>
  </div>

  <!-- Assets Tab -->
  <div id="tab-assets" class="tab-content p-4 space-y-3 hidden">
    <h2 class="text-lg font-bold text-cyan-400 mb-2">🏠 資產投資</h2>
    <div id="assets-list" class="space-y-3"></div>
    <h3 class="text-md font-bold text-purple-400 mt-4 mb-2">📦 我的倉庫</h3>
    <div id="warehouse-list" class="space-y-2"></div>
  </div>

  <!-- Social Tab -->
  <div id="tab-social" class="tab-content p-4 space-y-3 hidden">
    <h2 class="text-lg font-bold text-cyan-400 mb-2">👥 社交圈</h2>
    <div id="social-list" class="space-y-3"></div>
    <div id="partner-info" class="mt-4"></div>
  </div>

  <!-- Achievements Tab -->
  <div id="tab-achievements" class="tab-content p-4 space-y-3 hidden">
    <h2 class="text-lg font-bold text-cyan-400 mb-2">🏆 成就系統</h2>
    <div id="achievements-list" class="space-y-2"></div>
  </div>
</main>

<!-- Event Modal -->
<div id="event-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
  <div class="absolute inset-0 bg-black bg-opacity-70" onclick="UI.closeEventModal()"></div>
  <div class="relative bg-gray-900 border border-cyan-800 rounded-2xl p-6 max-w-sm w-full neon-border animate-modal">
    <div id="event-icon" class="text-4xl text-center mb-3">📰</div>
    <h3 id="event-title" class="text-lg font-bold text-center text-cyan-300 mb-2"></h3>
    <p id="event-desc" class="text-sm text-gray-400 text-center mb-4"></p>
    <div id="event-effect" class="text-xs text-center text-yellow-400 mb-4"></div>
    <button onclick="UI.closeEventModal()" class="w-full py-2 bg-cyan-700 hover:bg-cyan-600 rounded-xl font-bold transition">
      了解！
    </button>
  </div>
</div>

<!-- End Game Screen -->
<div id="end-screen" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
  <div class="absolute inset-0 bg-black bg-opacity-80"></div>
  <div class="relative bg-gray-900 border border-cyan-800 rounded-2xl p-6 max-w-sm w-full neon-border text-center">
    <div id="end-icon" class="text-6xl mb-3"></div>
    <h2 id="end-title" class="text-2xl font-black neon-text mb-2"></h2>
    <p id="end-subtitle" class="text-gray-400 mb-4"></p>
    <div id="end-stats" class="bg-gray-800 rounded-xl p-4 mb-4 text-left space-y-2 text-sm"></div>
    <div class="space-y-2">
      <button onclick="Leaderboard.promptName()" class="w-full py-3 bg-yellow-600 hover:bg-yellow-500 rounded-xl font-bold transition" style="box-shadow: 0 0 10px rgba(250,204,21,0.3);">
        🏅 登上排行榜
      </button>
      <button onclick="Game.newGame()" class="w-full py-3 bg-cyan-600 hover:bg-cyan-500 rounded-xl font-bold transition neon-border">
        🔄 再來一局
      </button>
      <button onclick="Game.showSplash()" class="w-full py-2 bg-gray-800 hover:bg-gray-700 rounded-xl text-sm transition">
        回主選單
      </button>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 z-40 bg-gray-900 border-t border-cyan-900 max-w-lg mx-auto hidden">
  <div class="grid grid-cols-4 text-center text-xs">
    <button onclick="UI.switchTab('market')" class="tab-btn py-3 text-cyan-400 border-t-2 border-cyan-400" data-tab="market">
      <div class="text-lg">🏪</div>市場
    </button>
    <button onclick="UI.switchTab('assets')" class="tab-btn py-3 text-gray-500" data-tab="assets">
      <div class="text-lg">🏠</div>資產
    </button>
    <button onclick="UI.switchTab('social')" class="tab-btn py-3 text-gray-500" data-tab="social">
      <div class="text-lg">👥</div>社交
    </button>
    <button onclick="UI.switchTab('achievements')" class="tab-btn py-3 text-gray-500" data-tab="achievements">
      <div class="text-lg">🏆</div>成就
    </button>
  </div>
</nav>

<!-- Name Input Modal -->
<div id="name-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
  <div class="absolute inset-0 bg-black bg-opacity-70"></div>
  <div class="relative bg-gray-900 border border-cyan-800 rounded-2xl p-6 max-w-sm w-full neon-border animate-modal">
    <h3 class="text-lg font-bold text-center text-cyan-300 mb-4">🏅 登上排行榜！</h3>
    <p class="text-sm text-gray-400 text-center mb-4">輸入你的名字，讓所有人知道誰才是真正的霸總！</p>
    <input id="player-name-input" type="text" maxlength="12" placeholder="輸入暱稱（最多 12 字）"
      class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-center text-cyan-300 font-bold mb-4 focus:outline-none focus:border-cyan-500">
    <div class="space-y-2">
      <button onclick="Leaderboard.submitScore()" class="w-full py-2 bg-cyan-700 hover:bg-cyan-600 rounded-xl font-bold transition">
        提交成績
      </button>
      <button onclick="Leaderboard.closeNameModal()" class="w-full py-2 bg-gray-800 hover:bg-gray-700 rounded-xl text-sm text-gray-400 transition">
        跳過
      </button>
    </div>
  </div>
</div>

<!-- Leaderboard Modal -->
<div id="leaderboard-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
  <div class="absolute inset-0 bg-black bg-opacity-70" onclick="Leaderboard.closeModal()"></div>
  <div class="relative bg-gray-900 border border-yellow-800 rounded-2xl p-5 max-w-sm w-full max-h-screen overflow-hidden" style="box-shadow: 0 0 20px rgba(250,204,21,0.2);">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-lg font-bold text-yellow-400">🏅 霸總排行榜</h3>
      <button onclick="Leaderboard.closeModal()" class="text-gray-500 hover:text-gray-300 text-xl">&times;</button>
    </div>
    <!-- Tab switcher -->
    <div class="flex gap-2 mb-4">
      <button onclick="Leaderboard.switchTab('local')" id="lb-tab-local" class="flex-1 py-2 rounded-lg text-xs font-bold bg-yellow-900 text-yellow-400 border border-yellow-700 transition">
        📱 本機紀錄
      </button>
      <button onclick="Leaderboard.switchTab('global')" id="lb-tab-global" class="flex-1 py-2 rounded-lg text-xs font-bold bg-gray-800 text-gray-500 border border-gray-700 transition">
        🌐 全球排名
      </button>
    </div>
    <div id="leaderboard-list" class="space-y-2 overflow-y-auto" style="max-height: 55vh;"></div>
    <div class="mt-4 text-center">
      <button onclick="Leaderboard.shareScore()" id="lb-share-btn" class="px-6 py-2 bg-purple-700 hover:bg-purple-600 rounded-xl text-sm font-bold transition hidden">
        📤 分享成績
      </button>
    </div>
  </div>
</div>

<!-- Toast Notification -->
<div id="toast" class="fixed top-16 left-1/2 transform -translate-x-1/2 z-50 px-4 py-2 rounded-xl text-sm font-bold transition-all duration-300 opacity-0 pointer-events-none"></div>

<script src="data.js"></script>
<script src="game.js"></script>
<script src="leaderboard.js"></script>
</body>
</html>
